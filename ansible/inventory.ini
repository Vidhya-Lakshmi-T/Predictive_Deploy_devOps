# =============================================================================
# ansible/inventory.ini
#
# Tells Ansible which server to deploy to.
# Replace 10.0.0.5 with your actual VM2 PRIVATE IP address.
# (Find it in Azure Portal → VM2 → Overview → Private IP address)
# =============================================================================

[app_servers]
vm2-app-server ansible_host=10.0.0.5 ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/ansible_key

[app_servers:vars]
ansible_python_interpreter=/usr/bin/python3
