# =============================================================================
# .github/workflows/ci-cd.yml
#
# Pipeline steps:
#   1. Run backend tests
#   2. Build Docker image
#   3. Deploy backend service
#   4. Query confusion score API
#   5. If score > threshold → trigger rollback (the novel CI/CD gate)
# =============================================================================

name: Predictive Deploy Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CONFUSION_THRESHOLD: 70          # rollback if score exceeds this
  API_URL: http://localhost:8000   # change to your deployed URL

jobs:

  # ── Job 1: Test ──────────────────────────────────────────────────────────────
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports: ["27017:27017"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run confusion engine unit tests
        run: |
          python -m pytest backend/tests/ -v --tb=short

      - name: Start backend for integration test
        run: |
          cd backend && uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 4  # wait for startup

      - name: Health check
        run: |
          curl -f http://localhost:8000/health || exit 1

      - name: Send test confusion events
        run: |
          curl -s -X POST http://localhost:8000/track \
            -H "Content-Type: application/json" \
            -d '{
              "session_id": "ci-test-session",
              "events": [
                {"session_id": "ci-test-session", "event_type": "rage_click", "count": 2},
                {"session_id": "ci-test-session", "event_type": "idle", "count": 1}
              ]
            }' | python3 -c "import sys,json; d=json.load(sys.stdin); print('Score:', d['confusion_score'])"

  # ── Job 2: Build Docker Image ─────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t predictive-deploy-backend:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name app -p 8000:8000 \
            -e MONGO_URI=mongodb://host.docker.internal:27017 \
            predictive-deploy-backend:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health && echo "Container healthy"
          docker stop app

  # ── Job 3: Deploy + Confusion Gate ───────────────────────────────────────────
  deploy:
    name: Deploy with confusion gate
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy backend service
        run: |
          echo "Deploying backend service..."
          # In production: ssh deploy, kubectl apply, etc.
          echo "Deploy complete."

      # ── THE NOVEL CI/CD GATE ────────────────────────────────────────────────
      # Query the live confusion score AFTER deploy.
      # If users are confused by the new version → automatic rollback.
      # This is the patentable step: behavioral telemetry as a pipeline gate.
      - name: Query confusion score (behavioral gate)
        id: confusion_check
        run: |
          echo "Querying confusion score from live system..."

          RESPONSE=$(curl -s ${{ env.API_URL }}/score/latest)
          SCORE=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('score', 0))")

          echo "Current confusion score: $SCORE"
          echo "Threshold: ${{ env.CONFUSION_THRESHOLD }}"
          echo "confusion_score=$SCORE" >> $GITHUB_OUTPUT

          if (( $(echo "$SCORE >= ${{ env.CONFUSION_THRESHOLD }}" | bc -l) )); then
            echo "rollback_needed=true" >> $GITHUB_OUTPUT
            echo "::warning::Confusion score $SCORE exceeds threshold. Rollback will be triggered."
          else
            echo "rollback_needed=false" >> $GITHUB_OUTPUT
            echo "Confusion score within acceptable range. Deploy confirmed."
          fi

      - name: Trigger rollback if threshold exceeded
        if: steps.confusion_check.outputs.rollback_needed == 'true'
        run: |
          echo "🚨 Triggering automated rollback..."

          curl -s -X POST "${{ env.API_URL }}/rollback?session_id=github-actions-${{ github.sha }}"

          echo "Rollback triggered. Reverting to previous stable version."
          # In production: git revert, kubectl rollout undo, etc.

          # Fail the pipeline so the bad commit is flagged in GitHub
          exit 1

      - name: Confirm successful deploy
        if: steps.confusion_check.outputs.rollback_needed == 'false'
        run: |
          echo "✅ Deploy confirmed. Confusion score: ${{ steps.confusion_check.outputs.confusion_score }}"
          echo "Version ${{ github.sha }} is live and users are navigating normally."
